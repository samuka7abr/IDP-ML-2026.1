name: airquality

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: airquality-api:latest
    container_name: airquality-api
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: "false"
      MODEL_PATH: /app/models/modelo.pkl
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
